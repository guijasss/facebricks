services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: facebrick
      POSTGRES_USER: facebrick
      POSTGRES_PASSWORD: facebrick
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facebrick -d facebrick"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      FACEBRICK_CONFIG_FILE: /app/config/facebrick.config.json
      FACEBRICK_ALLOWED_ORIGINS: ${FACEBRICK_ALLOWED_ORIGINS:-}
      FACEBRICK_BASIC_AUTH_USER: ${FACEBRICK_BASIC_AUTH_USER:-}
      FACEBRICK_BASIC_AUTH_PASSWORD: ${FACEBRICK_BASIC_AUTH_PASSWORD:-}
    command:
      - python
      - -m
      - uvicorn
      - main:build_app
      - --factory
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - /app/src
      - --reload-dir
      - /app/config
      - --reload-dir
      - /app
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    volumes:
      - ./:/app

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
